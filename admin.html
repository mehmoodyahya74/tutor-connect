<!DOCTYPE html>
<html>
<head>
    <title>Tutor Connect Admin</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; margin: 20px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { padding: 10px; margin: 5px; width: 100%; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        .flex { display: flex; gap: 20px; }
        .col { flex: 1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .success { background: #d4edda; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Tutor Connect Admin</h1>
        
        <div class="flex">
            <div class="col">
                <div class="card">
                    <h3>➕ Add Student</h3>
                    <input type="text" id="studentName" placeholder="Student Name">
                    <input type="text" id="parentName" placeholder="Parent Name">
                    <input type="text" id="parentPhone" placeholder="Parent WhatsApp">
                    <input type="number" id="age" placeholder="Age">
                    <select id="level">
                        <option>Beginner</option>
                        <option>Intermediate</option>
                        <option>Advanced</option>
                    </select>
                    <button onclick="addStudent()">Add Student</button>
                </div>
                
                <div class="card">
                    <h3>➕ Add Tutor</h3>
                    <input type="text" id="tutorName" placeholder="Tutor Name">
                    <input type="text" id="tutorPhone" placeholder="Tutor WhatsApp">
                    <input type="email" id="tutorEmail" placeholder="Email">
                    <div>
                        <label><input type="checkbox" value="Monday"> Mon</label>
                        <label><input type="checkbox" value="Tuesday"> Tue</label>
                        <label><input type="checkbox" value="Wednesday"> Wed</label>
                        <label><input type="checkbox" value="Thursday"> Thu</label>
                        <label><input type="checkbox" value="Friday"> Fri</label>
                    </div>
                    <button onclick="addTutor()">Add Tutor</button>
                </div>
            </div>
            
            <div class="col">
                <div class="card">
                    <h3>📋 Assign Tutor</h3>
                    <select id="assignStudent"></select>
                    <select id="assignTutor"></select>
                    <button onclick="assignTutor()">Assign</button>
                </div>
                
                <div class="card">
                    <h3>🎯 Manual Trigger</h3>
                    <button onclick="triggerSessions()">Create Sessions Now</button>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 Students</h3>
            <table id="studentsTable">
                <tr><th>Name</th><th>Parent</th><th>Phone</th><th>Tutor</th></tr>
            </table>
        </div>
        
        <div class="card">
            <h3>👨‍🏫 Tutors</h3>
            <table id="tutorsTable">
                <tr><th>Name</th><th>Phone</th><th>Availability</th></tr>
            </table>
        </div>
        
        <div class="card">
            <h3>📅 Upcoming Sessions</h3>
            <table id="sessionsTable">
                <tr><th>Student</th><th>Tutor</th><th>Date</th><th>Time</th><th>Link</th></tr>
            </table>
        </div>
    </div>

    <script>
        const API = 'https://tutor-connect-kikq.onrender.com/api';
        
        async function loadData() {
            // Load students
            const students = await fetch(API + '/students').then(r => r.json());
            let studentHtml = '';
            students.forEach(s => {
                studentHtml += `<tr><td>${s.name}</td><td>${s.parentName}</td><td>${s.parentPhone}</td><td>${s.assignedTutor?.name || 'Not assigned'}</td></tr>`;
            });
            document.getElementById('studentsTable').innerHTML = '<tr><th>Name</th><th>Parent</th><th>Phone</th><th>Tutor</th></tr>' + studentHtml;
            
            // Load tutors
            const tutors = await fetch(API + '/tutors').then(r => r.json());
            let tutorHtml = '';
            tutors.forEach(t => {
                tutorHtml += `<tr><td>${t.name}</td><td>${t.phone}</td><td>${t.availability.map(a => a.day).join(', ')}</td></tr>`;
            });
            document.getElementById('tutorsTable').innerHTML = '<tr><th>Name</th><th>Phone</th><th>Availability</th></tr>' + tutorHtml;
        }
        
        async function addStudent() {
            const student = {
                name: document.getElementById('studentName').value,
                parentName: document.getElementById('parentName').value,
                parentPhone: document.getElementById('parentPhone').value,
                age: document.getElementById('age').value,
                level: document.getElementById('level').value
            };
            
            await fetch(API + '/students', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(student)
            });
            
            loadData();
        }
        
        async function addTutor() {
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            const availability = [];
            days.forEach(day => {
                if (document.querySelector(`input[value="${day}"]`).checked) {
                    availability.push({day, startTime: '09:00', endTime: '21:00'});
                }
            });
            
            const tutor = {
                name: document.getElementById('tutorName').value,
                phone: document.getElementById('tutorPhone').value,
                email: document.getElementById('tutorEmail').value,
                availability
            };
            
            await fetch(API + '/tutors', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(tutor)
            });
            
            loadData();
        }
        
        async function triggerSessions() {
            await fetch(API + '/trigger-sessions', {method: 'POST'});
            alert('Sessions created! Check WhatsApp in 1 minute.');
        }
        
        loadData();
    </script>
</body>
</html>
